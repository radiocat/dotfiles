# エディターの補完を設定スキーマに合わせて取得
"$schema" = 'https://starship.rs/config-schema.json'

# シェルのプロンプトの間に空行を挿入する
add_newline = true

# ref https://github.com/starship/starship/discussions/1107?sort=top#discussioncomment-10214050
format = """
$username$directory$git_branch$git_status$python$custom$all$line_break$character"""

[username]
style_user = "yellow bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = true

[directory]
style = "cyan bold"
truncation_length = 3
truncation_symbol = "…/"
home_symbol = "🏠"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[git_branch]
symbol = "🌱 "
style = "bold purple"
truncation_length = 20
truncation_symbol = "…"

[git_status]
style = "bold red"
ahead = "↑${count}"
diverged = "↕↑${ahead_count}↓${behind_count}"
behind = "↓${count}"
conflicted = "CONFLICT"
untracked = "UNTRACKED"
stashed = "STASHED"
modified = "MODIFIED"
staged = "STAGED(${count})"
renamed = "RENAMED"
deleted = "DELETED"

[python]
symbol = "🐍 "
style = "bold yellow"
pyenv_prefix = "pyenv "

[cmd_duration]
min_time = 500
style = "italic gray"
format = "took $duration "

[custom.obsidian]
command = "echo '📓'"
when = 'pwd | grep -i "$OBSIDIAN_VAULT_PATH"'
style = "bold magenta"

[time]
disabled = false
format = '🕙 [$time]($style) '
time_format = '%m/%d %R'

[aws]
disabled = true

[gcloud]
disabled = true